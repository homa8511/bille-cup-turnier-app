name: Renovate Updates

on:
  schedule:
    - cron: '0 3 * * *' # Startet die Überprüfung täglich um 03:00 UTC
  workflow_dispatch: # Erlaubt den manuellen Start über die GitHub-Oberfläche

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Run Renovate
        uses: renovatebot/github-action@v40.0.0
        with:
          # Du musst ein GitHub Personal Access Token (PAT) als Secret namens RENOVATE_TOKEN hinterlegen
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_AUTODISCOVER: 'false'
          RENOVATE_REPOSITORIES: ${{ github.repository }}