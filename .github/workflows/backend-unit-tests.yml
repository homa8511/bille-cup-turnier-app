name: Backend Unit Tests

on:
  push:
    paths:
      - 'backend/src/**'
      - 'backend/tests/**'
      - 'backend/package.json'
  pull_request:
    paths:
      - 'backend/src/**'
      - 'backend/tests/**'
      - 'backend/package.json'
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # Führt die Tests täglich um 02:00 UTC aus

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test