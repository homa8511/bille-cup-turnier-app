server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip-Kompression für schnellere Ladezeiten aktivieren
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Alle Anfragen an die index.html der Single-Page-Application weiterleiten
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets mit langem Cache versehen
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

     # API-Anfragen an das Backend weiterleiten (falls nicht durch Traefik geregelt)
     location /api/ {
         proxy_pass http://backend:3000/;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
     }
}
